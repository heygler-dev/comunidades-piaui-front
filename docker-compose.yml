services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${APP_NAME:-premio}-front:${ENV_NAME:-prod}
    container_name: ${APP_NAME:-premio}-front-${ENV_NAME:-prod}
    ports:
      - "${HTTP_PORT:-8080}:80"
    environment:
      DOMAIN: ${DOMAIN:-_}
      # API do premio-back (porta publicada no host)
      API_HOST: ${API_HOST:-host.docker.internal}
      API_PORT: ${API_PORT:-3000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
